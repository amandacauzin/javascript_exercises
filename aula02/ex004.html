<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font: normal 20pt Arial;
        }
    </style>
</head>
<body>
    <script>
        var n1 = window.prompt('Qual seu salário?  ')
        n1.toFixed(2).replace('.',',') //2 casas decimais e troca . por ,
        n1.toLocaleString('pt-BR', {style: 'currency', currency: 'BLR'})
        window.alert('Valor do Sálario: ${n1.toLocaleString('pt-BR', {style: 'currency', currency: 'BLR'})}')

    </script>
</body>
</html>
